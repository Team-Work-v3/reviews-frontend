  <title>Оставьте отзыв</title>
  <link rel="stylesheet" href="/review/css/reviewmessage.css" />

<body>

  <div class="page">
    <div class="textglaw" id="Iteen">
       <img  src="/temp/getLogo/Iteen.png">
    <h1>
      Здравствуйте, <span class="highlight">{{ user_name }}</span>! Оставьте, пожалуйста,
      отзыв на мероприятие
      <span class="highlight">«{{ event_name }}»</span>
    </h1>
    </div>
<div id="hg">
    <div class="card">
      <h2>Оставьте отзыв</h2>

      <form action="/api/addReviewFormUser" method="post" id="reviewForm">
        <input type="hidden" name="event_id" value="{{ event_id }}">
        <input type="hidden" name="registration_id" value="{{ registration_id }}">
        <input type="hidden" name="images_events" id='avatar' value="/temp/getLogo/lemon.png">
        <label>
          <span id="shear"><span class="highlight">*</span>Поделитесь мнением</span>
          <textarea name="content"
            id="textsecond"
            id="comment"
            class="text"
            placeholder="Введите ваш отзыв"
            required
          ></textarea>
          <div class="error" id="commentError"></div>
        </label>

        <div class="illustrations">
          <p>Выберите иллюстрацию</p>

          <div class="icons" id="icons">
            <img src="/temp/getLogo/lemon.png" data-value="/temp/getLogo/lemon.png" class="active"/>
            <img src="/temp/getLogo/brown.png" data-value="/temp/getLogo/brown.png" />
            <img src="/temp/getLogo/swamp.png" data-value="/temp/getLogo/swamp.png" />
            <img src="/temp/getLogo/pink.png" data-value="/temp/getLogo/pink.png" />
            <img src="/temp/getLogo/yellow.png" data-value="/temp/getLogo/yellow.png" />
            <img src="/temp/getLogo/grey.png" data-value="/temp/getLogo/grey.png" />
          </div>

          <div class="error" id="iconError"></div>
        </div>

        <label class="checkbox">
          <input type="checkbox" id="agreement" />
          <span>Согласен на обработку данных</span>
        </label>
        <div class="error" id="agreementError"></div>

        <button type="submit" class="text">Поделиться</button>

      </form>
    </div>
  </div>
  </div>
